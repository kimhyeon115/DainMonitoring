
<!-- DMS 설정 콤보 -->
<ul id="computer-ul">
	<th:block th:each="computer : ${computerCombo}">
		<li th:text="${computer.name}" 
			th:data-id="${computer.id}"
			th:data-name="${computer.name}"
			th:data-ip="${computer.ip}"
			th:data-description="${computer.description}"
			ondblclick="SelectedComputerLi(this)">
		</li>
	</th:block>
</ul>


<ul id="company-ul">
	<th:block th:each="company : ${companyCombo}">
		<li th:text="${company.full_name}" 
			th:data-id="${company.id}" 
			th:data-full_name="${company.full_name}" 
			th:data-short_name="${company.short_name}" 
			th:data-tel="${company.tel}"
			th:data-address="${company.address}"  
			ondblclick="SelectedCompanyLi(this)">
		</li>
	</th:block>
</ul>


<ul id="place-ul">
	<th:block th:each="place : ${placeCombo}">
		<li th:text="${place.short_name}" 
			th:data-id="${place.id}"
			th:data-company_id="${place.company_id}"
			th:data-code="${place.code}"
			th:data-short_name="${place.short_name}"
			th:data-full_name="${place.full_name}"
			th:data-manager="${place.manager}"
			th:data-url="${place.url}"
			th:data-user="${place.user}"
			th:data-password="${place.password}"
			th:data-run="${place.run}"
			th:data-open="${place.open}"
			th:data-user_id="${place.user_id}"
			ondblclick="SelectedPlaceLi(this)">
		</li>
	</th:block>
</ul>


<ul id="logger-place-ul">
	<th:block th:each="place : ${placeCombo}">
		<li th:text="${place.short_name}" 
			th:data-id="${place.id}"
			ondblclick="SelectedLoggerPlaceLi(this)">
		</li>
	</th:block>
</ul>


<ul id="logger-ul">
	<th:block th:each="logger : ${loggerCombo}">
		<li th:text="${logger.code}" 
			th:data-id="${logger.id}" 
			ondblclick="SelectedLoggerLi(this)">
		</li>
	</th:block>
	
	<th:block th:if="${#lists.isEmpty(loggerCombo)}">
		<li>로거를 추가하세요</li>
	</th:block>
</ul>


<ul id="sensor-place-ul">
	<th:block th:each="place : ${placeCombo}">
		<li th:text="${place.short_name}" 
			th:data-id="${place.id}" 
			th:data-code="${place.code}" 
			ondblclick="SelectedSensorPlaceLi(this)">
		</li>
	</th:block>
	
	<th:block th:if="${#lists.isEmpty(placeCombo)}">
		<option value="0" selected disabled>현장을 추가하세요</option>
	</th:block>
</ul>


<ul id="sensor-ul">
	<th:block th:each="sensor : ${sensorCombo}">
		<li th:text="${sensor.code}" 
			th:data-id="${sensor.id}" 
			th:data-logger_id="${sensor.logger_id}" 
			ondblclick="SelectedSensorLi(this)"
			class="sensor-item">
		</li>
	</th:block>
</ul>


<ul id="sensor-type-ul">
	<th:block th:each="type : ${sensorTypeCombo}">
        <li th:text="${type.code}" 
			th:data-id="${type.id}" 
			th:data-code="${type.code}" 
			th:data-name="${type.name}"
			ondblclick="SelectedSensorTypeLi(this)">
		</li>
	</th:block>
</ul>


<ul id="sensor-type-place-ul">
	<th:block th:each="place : ${placeCombo}">
        <li th:text="${place.short_name}" 
			th:data-id="${place.id}"
			th:data-short_name="${place.short_name}"
			ondblclick="SelectedSensorTypePlaceLi(this)">
		</li>
	</th:block>
	
	<th:block th:if="${#lists.isEmpty(placeCombo)}">
		<option value="0" selected disabled>현장을 추가하세요</option>
	</th:block>
</ul>


<ul id="sensor-type-setting-ul">
	<th:block th:each="type : ${sensorTypeSettingCombo}">
        <li th:text="${type.code}" 
			th:data-id="${type.id}"
			th:data-code="${type.code}" 
			ondblclick="SelectedSensorTypePlaceSensorTypeLi(this)">
		</li>
	</th:block>
	
	<th:block th:if="${#lists.isEmpty(sensorTypeSettingCombo)}">
		<option value="0" selected disabled>센서를 추가하세요</option>
	</th:block>
</ul>


<ul id="calculation-ul">
	<th:block th:each="cal : ${calculationCombo}">
		<li th:text="${cal.name}" 
			th:data-id="${cal.id}" 
			th:data-name="${cal.name}" 
			th:data-formula="${cal.formula}" 
			th:data-target_column="${cal.target_column}" 
			th:data-description="${cal.description}" 
			ondblclick="SelectedCalculationLi(this)">
		</li>
	</th:block>
</ul>


<select id="place-company-id" class="form-select">
	<option th:each="company : ${companyCombo}" 
	  	th:text="${company.full_name}" th:value="${company.id}"
		th:selected="${company.id == 2}">
	</option>
</select>

 
<select id="logger-computer-id" class="form-select">
	<option th:each="computer : ${computerCombo}" 
	  	th:text="${computer.name}" th:value="${computer.id}"
		th:selected="${computer.id == 1}">
	</option>
</select>


<select id="sensor-logger-combo" class="form-select">
	<th:block th:each="logger : ${sensorLoggerCombo}">
		<option th:text="${logger.code}" th:value="${logger.id}"
			th:data-id="${logger.id}" th:data-code="${logger.code}">
		</option>
	</th:block>
	
	<th:block th:if="${#lists.isEmpty(sensorLoggerCombo)}">
		<option value="0" selected disabled>로거를 추가하세요</option>
	</th:block>
</select>


<tbody id="apply-calculation-body">
	<th:block th:each="row : ${applyCalculation}">
		<tr th:data-param_a="${row.A}"
			th:data-param_b="${row.B}"
			th:data-param_c="${row.C}"
			th:data-param_d="${row.D}"
			th:data-param_e="${row.E}"
			th:data-formula="${row.formula}"
			th:data-target_column="${row.target_column}">
			<td th:text="${row.target_column}"></td>
			<td style="color: #206bc4; font-weight: 500;"></td>
			<td th:text="${row.from_dt}"></td>
			<td th:text="${row.to_dt}"></td>
			<td th:text="${row.id}" style="display: none;"></td>
		</tr>
	</th:block>
</tbody>


<tbody id="sensor-initial-body">
	<tr th:each="row : ${sensorInitial}">
		<td th:text="initial"></td>
		<td th:text="${(row.rawVal % 1 == 0) ? row.rawVal.intValue() : row.rawVal}" class="val-color-blue"></td>
		<td th:text="${(row.displaceVal % 1 == 0) ? row.displaceVal.intValue() : row.displaceVal}" class="val-color-red"></td>
		<td th:text="${row.fromDt}"></td>
		<td th:text="${row.toDt}"></td>
	</tr>
</tbody>


<select id="datadel-logger-combo" class="form-select">
	<th:block th:each="logger : ${loggerEventCombo}">
		<option	th:text="${logger.code}" 
			th:value="${logger.id}">
		</option>
	</th:block>
	
	<th:block th:if="${#lists.isEmpty(loggerEventCombo)}">
		<option value="0" selected disabled>선택해주세요</option>
	</th:block>
</select>


<select id="datadel-sensor-combo" class="form-select">
	<option value="0" selected disabled>선택해주세요</option>
	<option th:each="sensor : ${sensorEventCombo}" th:text="${sensor.code}" 
		th:value="${sensor.id}" th:data-logger-id="${sensor.logger_id}">
	</option>
</select>


<select id="pick-type" class="form-select">
	<th:block th:each="type : ${applySensorTypeCombo}">
		<option	th:text="${type.code}" 
			th:value="${type.sensor_type_id}">
		</option>
	</th:block>
	
	<th:block th:if="${#lists.isEmpty(applySensorTypeCombo)}">
		<option value="0" selected disabled>= 선택 =</option>
	</th:block>
</select>


<select id="pick-sensor" class="form-select">
	<option value="0" selected disabled>= 선택 =</option>
	<th:block th:each="sensor : ${sensorCombo}">
		<option	th:text="${sensor.code}" th:value="${sensor.id}"
			th:data-type-id="${sensor.sensor_type_id}">
		</option>
	</th:block>
</select>


<tbody id="data-edit-body">
	<th:block th:each="row : ${dataEdit}">
		<tr th:data-id="${row.id}" th:data-place="${row.placeCode}" th:data-used="${row.used}" 
			class="row-list-tr" ondblclick="SelectedDataEditRow(this)">
			<td th:text="${row.placeName}"></td>
			<td th:text="${row.sensorCode}"></td>
			<td th:text="${row.sensorName}"></td>
			<td th:text="${row.measuredAt}"></td>
			<td th:text="${(row.rawVal % 1 == 0) ? row.rawVal.intValue() : row.rawVal}"></td>
			<td th:text="${(row.correctionVal % 1 == 0) ? row.correctionVal.intValue() : row.correctionVal}" class="val-color-blue"></td>
			<td th:text="${(row.angleVal % 1 == 0) ? row.angleVal.intValue() : row.angleVal}" class="val-color-green"></td>
			<td th:text="${(row.displaceVal % 1 == 0) ? row.displaceVal.intValue() : row.displaceVal}" class="val-color-orange"></td>
			<td th:text="${(row.initialVal % 1 == 0) ? row.initialVal.intValue() : row.initialVal}" class="val-color-gray"></td>
			<td th:text="${(row.changedVal % 1 == 0) ? row.changedVal.intValue() : row.changedVal}" class="val-color-red"></td>
			<td><span class="badge" th:classappend="${row.used == '1' ? 'bg-green' : 'bg-red'}" 
				th:text="${row.used == '1' ? '사용' : '삭제'}"></span></td>
		</tr>
	</th:block>
	
	<th:block th:if="${#lists.isEmpty(dataEdit)}">
		<tr>
			<td colspan="10" class="text-center text-muted">조회된 데이터가 없습니다.</td>
		</tr>
	</th:block>
</tbody>


<select id="transition-sensor">
	<th:block th:each="sensor : ${sensors}">
		<option	th:text="${sensor.sensorCode}" th:value="${sensor.sensorId}" 
			th:data-place="${sensor.placeCode}">
		</option>
	</th:block>
</select>
