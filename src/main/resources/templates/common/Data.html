<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
	
	<head>
		<meta charset="UTF-8">
		<title th:text="${model.place.fullName}"></title>
		
		<link rel="icon" href="data:,">
		<link href="/common/css/styles.css" rel="stylesheet" />
		<link href="/common/css/dain.css" rel="stylesheet" />
		<link href="/common/css/data.css" rel="stylesheet" />
		
		<!-- ✅ Font Awesome (CDN) -->
		<script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/js/all.min.js"></script>

		<!-- jQuery -->
		<script src="https://code.jquery.com/jquery-3.5.1.min.js" crossorigin="anonymous"></script>
		<!-- jQuery UI -->
		<script src="https://code.jquery.com/ui/1.12.1/jquery-ui.min.js"></script>
		
		<link rel="stylesheet" href="https://code.jquery.com/ui/1.12.1/themes/base/jquery-ui.css" type="text/css" />
		<script type="text/javascript" src="/common/js/bootstrap-4.5.3.bundle.min.js" crossorigin="anonymous"></script>

		<!-- Google Charts -->
		<script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>
		
		<!-- jquery -->
		<script src="https://code.jquery.com/jquery-3.4.1.js"></script>
		<script src="https://code.jquery.com/ui/1.12.1/jquery-ui.js"></script>
		
		<!-- js 파일 -->
		<script type="text/javascript" src="/common/js/const.js"></script>
		<script type="text/javascript" src="/common/js/data.js"></script>
		<script type="text/javascript" src="/common/js/drawGoogleChart.js"></script>
		<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
	</head>

	<body th:data-page-code="${model.place.code}" class="sb-nav-fixed">
		<nav class="sb-topnav navbar navbar-expand navbar-dark bg-dark">
			<button class="btn btn-link btn-sm order-1 order-lg-0" id="sidebarToggle"><i class="fas fa-bars"></i></button>
			<a class="navbar-brand" th:href="@{/{place}/main(place=${model.place.code})}" th:text="${model.place.shortName}"></a>
		</nav>
		
		<!-- 로딩 -->
		<div id="loadingOverlay">
			<div class="loading-content">
				<img src="/common/images/loading.png" alt="Loading..." class="rotate" />
			</div>
		</div>
		
		<div id="layoutSidenav">
			<div th:replace="~{common/navi/data_nav}"></div>
			<div id="layoutSidenav_content">
				<div>
					<div class='m-3'></div>
					<div class="d-md-inline-block form-inline ml-2 mr-2 mr-md-3 my-0 my-md-0">
						<input type='hidden' id='select' th:value='${model.select}'>
						<div class="form-inline my-2" style='float:left'>
							<label class="col-sm-4 control-label px-0" for="start" >시작일 : </label>
							<div class="col-sm-8 px-0" style="width: 150px;">
								<input type="date" class="dateFilter form-control-sm btn-block" 
									id="start" onkeydown="return false">
							</div>
						</div>
						<div class="form-inline my-2 ml-2 mr-2" style='float:left'>
							<label class="col-sm-4 control-label px-0" for="end" >종료일 : </label>
							<div class="col-sm-8 px-0" style="width: 150px;">
								<input type="date" class="dateFilter form-control-sm btn-block" 
									id="end" onkeydown="return false">
							</div>
						</div>
						<div class="chk_avg form-inline my-3 ml-2 mr-2" id="check_box" style='float:left; height: 100%;'>
							<input class='align-self-center' type="checkbox" id="average" style='float:left'>
							<label class='align-self-center' for="average" style='float:left; margin-left:3px'>일평균데이터 </label>
						</div>
						<div class="chk_avg form-inline my-3 ml-2 mr-2" id="check_box" style='float:left; height: 100%'>
							<input class='align-self-center' type="checkbox" id="oclock" style='float:left'>
							<label class='align-self-center' for="oclock" style='float:left; margin-left:3px'>정각데이터 </label>
						</div>
						<div class="my-2 ml-2 mr-2" style='float:left'>
							<button id="find" type="button" class="btn btn-sm btn-primary btn-block" >
								<i class="fa fa-search text-white-50"></i>
								조회하기
							</button>
						</div>
	                    <div class="my-2 ml-2 mr-2" style='float:left'>
	                       	<button id="excel_down" type="button" class="btn btn-sm btn-primary form-inline">
	                        	<i class="fas fa-download text-white-50"></i>
	                        	내려받기
	                        </button>
							<button id="print" type="button" class="btn btn-sm btn-primary form-inline ml-2" onClick="window.print()" >
								<i class="fa fa-print text-white-50"></i>
								프린트
							</button>
	                    </div>
					</div>
					<hr>
					<div class="py-3 px-3 my-3 mx-3 container">
		                <div class="text-center my-3 mb-3">
		                    <h2><span id="searchTitle"></span></h2>
		                </div>
		                <div id="common">
		                    <div class="my-3">
		                        현장명 : <span th:text="${model.place.fullName}"></span><br>
		                        검색기간 : <span id="period"></span><br>
		                    </div>
		                    <div id='chart' style="height: 400px; border: 1px solid #ccc;padding:5px;"></div>
					        <table id="tabledata" class="my-3" style="width: 100%;">
								<thead id="data_head"></thead>
								<tbody id="data_body"></tbody>
							</table>
		                </div>
	            	</div>
				</div>
			</div>
		</div>
	</body>

</html>
